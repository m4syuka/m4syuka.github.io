# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
remote_theme: "mmistakes/so-simple-theme@3.2.0"
skin: "/assets/css/skins/default.css"
locale: ru-RU  # изменил на русский
title: "m4syuka"
baseurl: ""  # важно: пустая строка, а не комментарий
url: "https://m4syuka.github.io"  # убрал # и кавычки правильно
logo: ""  # пока пусто, потом можно добавить /images/logo.png
date_format: "%d.%m.%Y"  # изменил на русский формат
read_time: true  # включил
words_per_minute: 200  # установил значение
mathjax:
  enable: false  # отключил, если не нужно
  combo: "tex-svg"
  tags: "none"
google_fonts:
  - name: "Source Sans Pro"
    weights: "400,400i,700,700i"
  - name: "Lora"
    weights: "400,400i,700,700i"
google_analytics: ""  # оставь пустым, если нет GA
disqus:
  shortname: ""  # оставь пустым, если нет Disqus
twitter:
  username: ""  # оставь пустым

# Liquid
liquid:
  error_mode: strict

# Build settings
permalink: /:categories/:title/
markdown: kramdown
feed:
  path: atom.xml

# Pagination - https://jekyllrb.com/docs/pagination/
# paginate: 10  # раскомментируй, когда будет больше 10 постов
# paginate_path: /page:num/

# Search
search_full_content: false

# Taxonomy pages
# category_archive_path: "/categories/#"
# tag_archive_path: "/tags/#"

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# ⚠️ ВАЖНО: добавлен плагин jekyll-remote-theme
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate
  - jekyll-remote-theme  # ← ЭТОТ ПЛАГИН БЫЛ ОТСУТСТВУЕТ!

# Front Matter Defaults
defaults:
  # Posts defaults
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      share: true

# Site Author
author:
  picture: ""
  email: ""
  twitter: ""
  links:
    - title: "Telegram"
      url: "https://t.me/m4syuka"  # замени на свой
      icon: "fab fa-telegram"

# Footer Links
footer_links:
  - title: Feed
    url: atom.xml
    icon: fas fa-rss-square
